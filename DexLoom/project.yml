name: DexLoom
options:
  xcodeVersion: "15.4"
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
configs:
  Debug: debug
  Release: release
settings:
  base:
    DEVELOPMENT_TEAM: GNB2PTDW8N
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      GCC_PREPROCESSOR_DEFINITIONS:
        - "DEBUG=1"
        - "$(inherited)"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      ENABLE_NS_ASSERTIONS: NO

targets:
  DexLoom:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DexLoom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jian.DexLoom
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        HEADER_SEARCH_PATHS: "$(SRCROOT)/DexLoom/Core/Include"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        OTHER_LDFLAGS: "-lz"
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_OBJC_BRIDGING_HEADER: DexLoom/Support/DexLoom-Bridging-Header.h

  DexLoomTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DexLoomTests
    dependencies:
      - target: DexLoom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jian.DexLoomTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DexLoom.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DexLoom"

  DexLoomUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DexLoomUITests
    dependencies:
      - target: DexLoom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jian.DexLoomUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        TEST_TARGET_NAME: DexLoom

schemes:
  DexLoom:
    build:
      targets:
        DexLoom: all
        DexLoomTests: [test]
        DexLoomUITests: [test]
    test:
      targets:
        - DexLoomTests
        - DexLoomUITests
